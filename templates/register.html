{% extends "base.html" %}

{% block title %}Patient Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Patient Registration</h2>
        <form method="POST" action="{{ url_for('registerPatient') }}">
            
            <div class="mb-3">
                <label for="name" class="form-label">Full Name:</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" class="form-control" id="username" name="username" required>
                <div class="form-text">Choose a unique username for login.</div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Register Account</button>
        </form>
        <p class="mt-3">Already have an account? <a href="{{ url_for('loginUser') }}">Log In here</a></p>
    </div>
</div>
{% endblock %}
