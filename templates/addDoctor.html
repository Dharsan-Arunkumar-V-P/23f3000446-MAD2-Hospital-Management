{% extends "base.html" %}

{% block title %}Add Doctor{% endblock %}

{% block content %}
<a href="{{ url_for('dashboardPage') }}"
   class="btn btn-outline-secondary btn-sm mb-3">
    &larr; Back to Dashboard
</a>
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add New Doctor</h2>
        
        <form method="POST" action="{{ url_for('addDoctor') }}">
            
            <div class="mb-3">
                <label for="name" class="form-label">Full Name:</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="mb-3">
                <label for="specialization" class="form-label">Specialization:</label>
                <input type="text" class="form-control" id="specialization" name="specialization" placeholder="e.g., Cardiology" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Temporary Password:</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-success">Add Doctor</button>
            <a href="{{ url_for('listDoctors') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
