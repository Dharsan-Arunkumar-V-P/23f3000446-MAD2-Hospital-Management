{% extends "base.html" %}
{% block title %}Update Appointment{% endblock %}

{% block content %}
<a href="{{ url_for('dashboardPage') }}"
   class="btn btn-outline-secondary btn-sm mb-3">
    &larr; Back to Dashboard
</a>
<h2 class="mb-4">Update Appointment #{{ appt.id }}</h2>

<div class="mb-3">
    <p><strong>Patient:</strong> {{ appt.patient.name }}</p>
    <p><strong>Date:</strong> {{ appt.date }} |
       <strong>Time:</strong> {{ appt.time }}</p>
</div>

<form method="POST">
    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select id="status" name="status" class="form-select">
            <option value="Booked"
                {% if appt.status == 'Booked' %}selected{% endif %}>
                Booked
            </option>
            <option value="Completed"
                {% if appt.status == 'Completed' %}selected{% endif %}>
                Completed
            </option>
            <option value="Cancelled"
                {% if appt.status == 'Cancelled' %}selected{% endif %}>
                Cancelled
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label for="diagnosis" class="form-label">Diagnosis</label>
        <textarea id="diagnosis" name="diagnosis"
                  class="form-control"
                  rows="3">{{ appt.diagnosis or '' }}</textarea>
    </div>

    <div class="mb-3">
        <label for="prescription" class="form-label">Prescription</label>
        <textarea id="prescription" name="prescription"
                  class="form-control"
                  rows="3">{{ appt.prescription or '' }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('listPatientAppointments') }}"
       class="btn btn-secondary">Back</a>
</form>
{% endblock %}
